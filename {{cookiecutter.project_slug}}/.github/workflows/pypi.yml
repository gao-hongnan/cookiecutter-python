name: PyPI Release

on:
  push:
    tags: ["v*"]

env:
  UV_FROZEN: true
  FORCE_COLOR: 1

jobs:
  ci:
    uses: ./.github/workflows/ci.yml

  release:
    name: Publish to PyPI
    needs: ci
    runs-on: ubuntu-latest
    permissions:
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v6
        with:
          version: "latest"
          enable-cache: true
          cache-dependency-glob: "**/pyproject.toml"

      - name: Build package
        run: uv build

      - name: Publish to PyPI
        run: uv publish
