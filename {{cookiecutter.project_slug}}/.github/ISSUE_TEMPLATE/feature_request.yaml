name: Feature Request
description: Suggest a new feature or enhancement
title: "feat(<scope>): <short imperative summary>"
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        **Title convention** — this repo uses [Conventional Commits](https://www.conventionalcommits.org/) for commits, issues, and PRs.
        Use `feat(<scope>): <subject>` for new features. Example: `feat({{ cookiecutter.package_name }}): add new capability`.
        Scope is optional; omit the parentheses if there isn't a meaningful one.

  - type: checkboxes
    id: preflight
    attributes:
      label: Preflight
      options:
        - label: I searched existing issues and discussions for duplicates
          required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: What problem does this feature solve?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: How should this feature work?
    validations:
      required: true

  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: Concrete, checkable conditions that mark this as done. Prefer bullet points.
      placeholder: |
        - [ ] `{{ cookiecutter.package_name }}.foo.bar` exposes `do_thing(x: int) -> Result`
        - [ ] Documented in docs/reference/foo.md
        - [ ] Unit test covers the empty-input edge case
      render: markdown
    validations:
      required: true

  - type: textarea
    id: non_goals
    attributes:
      label: Out of scope / non-goals
      description: What this feature explicitly will NOT do

  - type: textarea
    id: dependencies
    attributes:
      label: Dependencies / related issues
      description: Blockers, prerequisite work, or related tickets (e.g. "blocked by #42")

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: What other approaches have you considered?

  - type: dropdown
    id: impact
    attributes:
      label: Impact
      options:
        - High
        - Medium
        - Low
    validations:
      required: true
