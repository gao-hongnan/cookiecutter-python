name: Bug Report
description: Report a bug or unexpected behavior
title: "fix(<scope>): <short imperative summary>"
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        **Title convention** — this repo uses [Conventional Commits](https://www.conventionalcommits.org/) for commits, issues, and PRs.
        Use `fix(<scope>): <subject>` for bugs. Example: `fix(cli): handle empty config path`.
        Scope is optional; omit the parentheses if there isn't a meaningful one.

  - type: checkboxes
    id: preflight
    attributes:
      label: Preflight
      options:
        - label: I searched existing issues for duplicates
          required: true
        - label: I can reproduce this on the latest main
          required: false

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - P0 - Critical
        - P1 - High
        - P2 - Medium
        - P3 - Low
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version / commit SHA
      description: Exact ref where the bug reproduces (e.g. v0.2.1 or a4114a5)
      placeholder: a4114a5
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: Clear description of the bug
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Minimal reproduction — commands, inputs, ordering
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / stack trace
      description: Paste the full traceback or relevant log output
      render: shell

  - type: dropdown
    id: regression
    attributes:
      label: Regression
      description: Did this work in a prior version?
      options:
        - Unknown
        - "Yes — worked in a prior version"
        - "No — never worked"
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: OS
      placeholder: macOS 15.3 (darwin arm64)
    validations:
      required: true

  - type: input
    id: python
    attributes:
      label: Python version
      placeholder: 3.13.1
    validations:
      required: true

  - type: input
    id: uv
    attributes:
      label: uv version
      placeholder: 0.5.11
    validations:
      required: true
